{% extends "../layouts/base.html" %}
{% load static %}

{% block title %}Update Staff{% endblock %}

{% block content %}
<div class="container mt-5">
  <h2 class="mb-4">Update Staff Role</h2>

  <form method="post">
    {% csrf_token %}

    <div class="mb-3">
      <label class="form-label">Staff Member</label>
      <input type="text"
             class="form-control"
             value="{{ object.user.get_full_name|default:object.user.email }}"
             disabled>
    </div>

    <div class="mb-3">
      <label class="form-label" for="id_role">Role</label>
      {{ form.role }}
    </div>

    <div class="d-flex justify-content-between mt-4">
      <a href="{% url 'staff:list' store_id=request.resolver_match.kwargs.store_id %}"
         class="btn btn-outline-secondary">
        Cancel
      </a>
      <button type="submit" class="btn btn-primary">
        Save Changes
      </button>
    </div>
  </form>
</div>
{% endblock %}
