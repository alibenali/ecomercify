{% extends "../layouts/base.html" %}

{% block title %}Delete Store{% endblock %}

{% block content %}
<div class="container-fluid py-4">
  <div class="row justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h1 class="h4 fw-semibold text-body mb-3">Delete store</h1>
          <p class="text-muted small mb-4">
            Are you sure you want to delete the store
            <span class="fw-semibold">{{ store.name }}</span>?
            This action cannot be undone.
          </p>

          <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-between">
              <a href="{% url 'stores:list' %}" class="btn btn-outline-secondary">
                Cancel
              </a>
              <button type="submit" class="btn btn-danger">
                Delete store
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
